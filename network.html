<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        .network-box { background: #ffffffcc; border-radius: 28px; padding: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-top: 1rem; }
        #relationChart { width: 100%; height: 70vh; }
        .legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .legend span { display: inline-block; width: 16px; height: 16px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="nav-btn">🏠 首页</a>
        <a href="map.html" class="nav-btn">🗺️ 时空地图</a>
        <a href="network.html" class="nav-btn active">🕸️ 人物关系网</a>
        <a href="timeline.html" class="nav-btn">📅 大事件年历</a>
    </div>
    <div class="page-container">
        <h2>🕸️ 斯诺的知识网络 · 人物关联</h2>
        <p>节点大小反映影响力，线条表示采访、友谊、合作、政治对峙等关系。</p>
        <div class="network-box">
            <div id="relationChart"></div>
        </div>
        <div class="legend">
            <div><span style="background:#b14732;"></span> 中心人物(斯诺)</div>
            <div><span style="background:#2c7a47;"></span> 中国友人/革命领袖</div>
            <div><span style="background:#2c7aa0;"></span> 外国友人/合作者</div>
            <div><span style="background:#b55b2c;"></span> 政治对手/批评对象</div>
            <div><span style="background:#c0a375;"></span> 其他重要人物</div>
        </div>
        <footer>悬停节点可查看简介，拖动可重新布局</footer>
    </div>
    <script src="js/data.js"></script>
    <script src="js/network.js"></script>
