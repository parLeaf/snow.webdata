<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>时空足迹 · 斯诺在中国</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        #map { height: 65vh; border-radius: 24px; border: 2px solid #dbbc7e; margin-bottom: 1rem; background: #e2e0d8; }
        .map-container { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .event-sidebar { flex: 1; background: #fffaf2; border-radius: 24px; padding: 1rem; overflow-y: auto; max-height: 65vh; }
        .event-sidebar h3 { border-left: 5px solid #8b2c1d; padding-left: 12px; margin-bottom: 1rem; }
        .loc-event-item { border-bottom: 1px solid #e2d5c0; padding: 10px 0; cursor: pointer; transition: background 0.1s; }
        .loc-event-item:hover { background: #f3ebdd; }
        .loc-event-name { font-weight: bold; color: #a53721; }
        .loc-event-desc { font-size: 0.85rem; color: #4e4a42; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="nav-btn">🏠 首页</a>
        <a href="map.html" class="nav-btn active">🗺️ 时空地图</a>
        <a href="network.html" class="nav-btn">🕸️ 人物关系网</a>
        <a href="timeline.html" class="nav-btn">📅 大事件年历</a>
    </div>
    <div class="page-container">
        <h2>📍 斯诺的时空足迹 · 历史现场</h2>
        <div class="map-container">
            <div id="map"></div>
            <div class="event-sidebar" id="mapEventList">
                <h3>📌 重要地点 & 关联事件（点击跳转时间轴）</h3>
                <div id="dynamicEventsList">加载中...</div>
            </div>
        </div>
        <footer>点击地图上的图钉可查看详情，悬浮显示事件摘要 | 侧边栏事件可跳转时间轴</footer>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/data.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
